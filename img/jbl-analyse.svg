<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Analyse concurrentielle JBL">
  <rect width="800" height="500" fill="#141416"/>
  <g font-family="Inter, sans-serif">
    <text x="50" y="70" fill="#f5f5f7" font-size="34" font-weight="700">JBL vs Concurrents</text>
    <text x="50" y="100" fill="#a1a1a6" font-size="18">Scraping Fnac &amp; Darty — analyse de positionnement</text>
    <!-- axes -->
    <line x1="80" y1="420" x2="760" y2="420" stroke="#333" stroke-width="2"/>
    <line x1="80" y1="150" x2="80" y2="420" stroke="#333" stroke-width="2"/>
    <!-- bars catalogue -->
    <rect x="140" y="200" width="70" height="220" rx="6" fill="#d32f2f"/>
    <rect x="260" y="300" width="70" height="120" rx="6" fill="#555"/>
    <rect x="380" y="320" width="70" height="100" rx="6" fill="#555"/>
    <text x="175" y="445" fill="#f5f5f7" font-size="15" text-anchor="middle">JBL</text>
    <text x="295" y="445" fill="#a1a1a6" font-size="15" text-anchor="middle">Conc. A</text>
    <text x="415" y="445" fill="#a1a1a6" font-size="15" text-anchor="middle">Conc. B</text>
    <text x="290" y="180" fill="#a1a1a6" font-size="15">Catalogue (nb de produits)</text>
    <!-- avis line -->
    <polyline points="175,310 295,300 415,295" fill="none" stroke="#4CAF50" stroke-width="3"/>
    <circle cx="175" cy="310" r="6" fill="#4CAF50"/>
    <circle cx="295" cy="300" r="6" fill="#4CAF50"/>
    <circle cx="415" cy="295" r="6" fill="#4CAF50"/>
    <text x="520" y="300" fill="#4CAF50" font-size="15">Nb d'avis ≈ identique</text>
    <text x="520" y="225" fill="#d32f2f" font-size="15" font-weight="600">Catalogue ~2x plus grand…</text>
    <text x="520" y="250" fill="#a1a1a6" font-size="15">…mais pas plus d'avis</text>
  </g>
</svg>
